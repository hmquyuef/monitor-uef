<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor-UEF | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #a855f7;
            --green: #22c55e;
            --yellow: #f59e0b;
            --red: #ef4444;
            --bg: #0a0f1e;
            --card-bg: rgba(22, 32, 58, 0.85);
            --card-border: rgba(99,102,241,0.15);
            --text: #f1f5f9;
            --muted: rgba(241,245,249,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(99,102,241,0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.1) 0%, transparent 50%);
            color: var(--text);
            padding: 24px;
            min-height: 100vh;
        }

        .dashboard { max-width: 1400px; margin: 0 auto; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding: 18px 28px;
            border-radius: 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
        }
        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav { display: flex; gap: 10px; }
        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--muted);
            padding: 9px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            transition: all 0.25s;
        }
        .nav-btn:hover { background: rgba(99,102,241,0.2); color: white; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Tabs */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        /* Agent Grid */
        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 22px;
            margin-top: 24px;
        }

        .agent-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 22px;
            border: 1px solid var(--card-border);
            transition: border-color 0.3s;
        }
        .agent-card:hover { border-color: rgba(99,102,241,0.4); }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        .agent-name { font-size: 1.1rem; font-weight: 600; }
        .agent-badge {
            font-size: 0.72rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
        }
        .badge-online  { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
        .badge-offline { background: rgba(239,68,68,0.15);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3); }

        /* OS & Uptime Info */
        .sys-info-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .sys-tag {
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: var(--muted);
        }

        /* Percent Gauges */
        .gauge-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }
        .gauge-item {
            text-align: center;
            padding: 12px 8px;
            border-radius: 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .gauge-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.1;
        }
        .gauge-label {
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 2px;
        }
        .gauge-cpu   { color: #818cf8; }
        .gauge-ram   { color: #34d399; }
        .gauge-disk  { color: #fb923c; }

        /* Metric Sections */
        .metric-section {
            background: rgba(0,0,0,0.25);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 0.82rem;
        }
        .metric-section-title {
            font-size: 0.72rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .metric-row:last-child { border-bottom: none; }
        .metric-row .label { color: var(--muted); }
        .metric-row .val   { font-weight: 500; }

        /* Charts Tab */
        .charts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 24px 0 16px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .agent-selector {
            padding: 9px 16px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
        }
        .range-btns { display: flex; gap: 6px; }
        .range-btn {
            padding: 8px 16px;
            border: 1px solid var(--card-border);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--muted);
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .range-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }
        .chart-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--card-border);
        }
        .chart-card h3 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 16px;
        }

        /* Alerts */
        .alerts-section {
            margin-top: 28px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px 24px;
            border-radius: 18px;
        }
        .alerts-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 12px; }
        .alert-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.85rem;
        }
        .alert-item:last-child { border-bottom: none; }
        .dot-critical { width:8px; height:8px; background: var(--red);   border-radius:50%; margin-right:12px; flex-shrink:0; }
        .dot-warning  { width:8px; height:8px; background: var(--yellow); border-radius:50%; margin-right:12px; flex-shrink:0; }

        /* Settings */
        .settings-card {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            max-width: 600px;
            margin: 24px auto 0;
            border: 1px solid var(--card-border);
        }
        .settings-card h2 { font-size: 1.1rem; margin-bottom: 22px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 7px; font-size: 0.85rem; color: var(--muted); }
        input {
            width: 100%;
            padding: 11px 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); }
        .save-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }
        .save-btn:hover { opacity: 0.88; }

        /* Network speed bar */
        .net-speed-bar {
            height: 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.08);
            margin-top: 4px;
            overflow: hidden;
        }
        .net-speed-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.6s ease;
        }
    </style>
</head>
<body>
<div class="dashboard">
    <header>
        <h1>⚡ Monitor-UEF Admin</h1>
        <nav>
            <button class="nav-btn active" id="btn-dashboard" onclick="switchTab('dashboard', this)">🏠 Dashboard</button>
            <button class="nav-btn" id="btn-charts"    onclick="switchTab('charts', this)">📊 Charts</button>
            <button class="nav-btn" id="btn-settings"  onclick="switchTab('settings', this)">⚙️ Settings</button>
        </nav>
    </header>

    <!-- DASHBOARD TAB -->
    <div id="dashboard-tab" class="tab-content active">
        <section class="agents-grid" id="agents-container"></section>
        <div class="alerts-section">
            <h2>🔔 Cảnh báo mới nhất</h2>
            <div id="alerts-list"><span style="color:var(--muted); font-size:0.85rem;">Chưa có cảnh báo nào.</span></div>
        </div>
    </div>

    <!-- CHARTS TAB -->
    <div id="charts-tab" class="tab-content">
        <div class="charts-header">
            <div style="display:flex;gap:12px;align-items:center;">
                <span style="font-size:0.85rem;color:var(--muted);">Agent:</span>
                <select class="agent-selector" id="chart-agent-select" onchange="loadCharts()">
                    <option value="">— Chọn Agent —</option>
                </select>
            </div>
            <div class="range-btns">
                <button class="range-btn active" onclick="setRange('1d', this)">Hôm nay</button>
                <button class="range-btn"        onclick="setRange('7d', this)">7 Ngày</button>
                <button class="range-btn"        onclick="setRange('30d', this)">30 Ngày</button>
            </div>
        </div>
        <div class="charts-grid">
            <div class="chart-card">
                <h3>🔲 CPU Usage (%)</h3>
                <canvas id="chart-cpu" height="130"></canvas>
            </div>
            <div class="chart-card">
                <h3>🟢 RAM Usage (%)</h3>
                <canvas id="chart-ram" height="130"></canvas>
            </div>
            <div class="chart-card">
                <h3>🟠 Disk Usage (%)</h3>
                <canvas id="chart-disk" height="130"></canvas>
            </div>
            <div class="chart-card">
                <h3>🌐 Network Speed (KB/s)</h3>
                <canvas id="chart-net" height="130"></canvas>
            </div>
        </div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="settings-tab" class="tab-content">
        <div class="settings-card">
            <h2>⚙️ Cấu hình hệ thống</h2>
            <form id="settings-form">
                <div class="form-group">
                    <label>Thời gian thu thập (giây)</label>
                    <input type="number" name="collect_interval" value="10" min="1">
                </div>
                <div class="form-group">
                    <label>Telegram Bot Token</label>
                    <input type="text" name="telegram_bot_token" placeholder="7123456:ABC...">
                </div>
                <div class="form-group">
                    <label>Telegram Chat ID</label>
                    <input type="text" name="telegram_chat_id" placeholder="-100xxxxxx">
                </div>
                <button type="submit" class="save-btn">💾 Lưu cấu hình</button>
            </form>
        </div>
    </div>
</div>

<script>
const socket = io();

// ── Helpers ──────────────────────────────────────────────
function fmtGB(bytes) {
    if (!bytes && bytes !== 0) return 'N/A';
    return (bytes / 1073741824).toFixed(2) + ' GB';
}
function fmtUptime(s) {
    const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
    return [d && `${d}d`, h && `${h}h`, m && `${m}m`].filter(Boolean).join(' ') || '< 1m';
}
function fmtBps(bps) {
    if (bps >= 1048576)   return (bps / 1048576).toFixed(1) + ' MB/s';
    if (bps >= 1024)      return (bps / 1024).toFixed(1) + ' KB/s';
    return bps + ' B/s';
}
function fmtTemp(c) { return c !== null && c !== undefined ? `${c} °C` : 'N/A'; }

// ── Tab Switching ─────────────────────────────────────────
function switchTab(tabId, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`${tabId}-tab`).classList.add('active');
    btn.classList.add('active');
    if (tabId === 'settings') loadSettings();
    if (tabId === 'charts')   populateAgentSelect();
}

// ── Settings ──────────────────────────────────────────────
async function loadSettings() {
    const data = await fetch('/api/settings').then(r => r.json());
    const form = document.getElementById('settings-form');
    for (const [k, v] of Object.entries(data))
        if (form.elements[k]) form.elements[k].value = v;
}
document.getElementById('settings-form').onsubmit = async e => {
    e.preventDefault();
    const data = Object.fromEntries(new FormData(e.target).entries());
    const r = await fetch('/api/settings', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
    if (r.ok) alert('✅ Đã lưu cấu hình thành công!');
};

// ── Agent Card Rendering ───────────────────────────────────
const agentMeta = {};   // agentId -> { id, name }

socket.on('metric:update', data => {
    agentMeta[data.agent_id] = { id: data.agent_id, name: data.agent_name };

    const container = document.getElementById('agents-container');
    let card = document.getElementById(`agent-${data.agent_id}`);
    if (!card) {
        card = document.createElement('div');
        card.id = `agent-${data.agent_id}`;
        card.className = 'agent-card';
        card.style.cursor = 'pointer';
        card.onclick = () => openAgentCharts(data.agent_id, data.agent_name);
        container.appendChild(card);
    }

    const m = data.metrics;
    const x = m.extra_data || {};

    // Determine color based on value
    const cpuColor  = m.cpu_percent  > 85 ? 'var(--red)' : m.cpu_percent  > 60 ? 'var(--yellow)' : 'var(--primary)';
    const ramColor  = m.ram_percent  > 85 ? 'var(--red)' : m.ram_percent  > 60 ? 'var(--yellow)' : 'var(--green)';
    const diskColor = m.disk_percent > 85 ? 'var(--red)' : m.disk_percent > 60 ? 'var(--yellow)' : 'var(--yellow)';

    card.innerHTML = `
        <div class="card-header">
            <div>
                <div class="agent-name">${data.agent_name}</div>
                <div style="font-size:0.75rem;color:var(--muted);margin-top:2px;">${x.hostname || ''}</div>
            </div>
            <span class="agent-badge badge-online">● Online</span>
        </div>

        <div class="sys-info-row">
            <span class="sys-tag">🐧 ${x.os || '—'} ${x.os_release || ''}</span>
            <span class="sys-tag">🕒 Up: ${x.uptime ? fmtUptime(x.uptime) : 'N/A'}</span>
            <span class="sys-tag">🏗 ${x.machine || '—'}</span>
        </div>

        <div class="gauge-row">
            <div class="gauge-item">
                <span class="gauge-value" style="color:${cpuColor}">${m.cpu_percent ?? '—'}%</span>
                <div class="gauge-label">CPU</div>
            </div>
            <div class="gauge-item">
                <span class="gauge-value" style="color:${ramColor}">${m.ram_percent ?? '—'}%</span>
                <div class="gauge-label">RAM</div>
            </div>
            <div class="gauge-item">
                <span class="gauge-value" style="color:${diskColor}">${m.disk_percent ?? '—'}%</span>
                <div class="gauge-label">Disk</div>
            </div>
        </div>

        <!-- CPU Info -->
        <div class="metric-section">
            <div class="metric-section-title">⚙️ CPU Info</div>
            <div class="metric-row"><span class="label">Sockets</span>      <span class="val">${x.cpu_num_sockets ?? '—'}</span></div>
            <div class="metric-row"><span class="label">vCPU/Socket</span>  <span class="val">${x.cpu_cores_per_socket ?? '—'}</span></div>
            <div class="metric-row"><span class="label">Total vCPU</span>   <span class="val">${x.cpu_logical_cores ?? '—'}</span></div>
            <div class="metric-row"><span class="label">Physical Cores</span><span class="val">${x.cpu_physical_cores ?? '—'}</span></div>
            <div class="metric-row"><span class="label">Freq</span>          <span class="val">${m.cpu_freq_mhz ?? '—'} MHz (Max: ${x.cpu_freq_max_mhz ?? '—'} MHz)</span></div>
            <div class="metric-row"><span class="label">Load Avg</span>     <span class="val">${x.cpu_load_avg ? x.cpu_load_avg.join(' / ') : '—'}</span></div>
            <div class="metric-row"><span class="label">Temperature</span>  <span class="val">${fmtTemp(x.cpu_temp_celsius)}</span></div>
        </div>

        <!-- Memory Info -->
        <div class="metric-section">
            <div class="metric-section-title">🟢 Memory</div>
            <div class="metric-row"><span class="label">RAM Used</span>   <span class="val">${fmtGB(x.ram_used)} / ${fmtGB(x.ram_total)}</span></div>
            <div class="metric-row"><span class="label">RAM Free</span>   <span class="val">${fmtGB(x.ram_free)}</span></div>
            <div class="metric-row"><span class="label">Swap Used</span>  <span class="val">${fmtGB(m.swap_used)} / ${fmtGB(x.swap_total)}</span></div>
        </div>

        <!-- Disk Info -->
        <div class="metric-section">
            <div class="metric-section-title">🟠 Disk</div>
            <div class="metric-row"><span class="label">Total</span> <span class="val">${fmtGB(x.disk_total)}</span></div>
            <div class="metric-row"><span class="label">Used</span>  <span class="val">${fmtGB(x.disk_used)}</span></div>
            <div class="metric-row"><span class="label">Free</span>  <span class="val">${fmtGB(x.disk_free)}</span></div>
            <div class="metric-row"><span class="label">Read</span>  <span class="val">${fmtBps(m.disk_read_bps)}</span></div>
            <div class="metric-row"><span class="label">Write</span> <span class="val">${fmtBps(m.disk_write_bps)}</span></div>
        </div>

        <!-- Network Info -->
        <div class="metric-section">
            <div class="metric-section-title">🌐 Network</div>
            <div class="metric-row"><span class="label">↑ Send</span>   <span class="val">${fmtBps(x.net_send_bps)}</span></div>
            <div class="metric-row"><span class="label">↓ Recv</span>   <span class="val">${fmtBps(x.net_recv_bps)}</span></div>
            <div class="metric-row"><span class="label">Open Sockets</span><span class="val">${x.open_sockets ?? '—'}</span></div>
            <div class="metric-row"><span class="label">Established</span><span class="val">${x.established_conn ?? '—'}</span></div>
            <div class="metric-row"><span class="label">Listening Ports</span><span class="val">${x.listen_ports ?? '—'}</span></div>
        </div>

        <div style="font-size:0.7rem;color:var(--muted);text-align:right;margin-top:4px;">Click để xem biểu đồ →</div>
    `;
});

socket.on('alert:new', alert => {
    const list = document.getElementById('alerts-list');
    if (list.querySelector('span')) list.innerHTML = '';
    const item = document.createElement('div');
    item.className = 'alert-item';
    item.innerHTML = `<div class="dot-critical"></div><strong>${alert.agent_name}</strong>: ${alert.message}`;
    list.prepend(item);
});

// ── Charts ────────────────────────────────────────────────
let currentRange  = '1d';
let currentAgent  = null;
const chartInstances = {};

function setRange(range, btn) {
    currentRange = range;
    document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadCharts();
}

function populateAgentSelect() {
    const sel = document.getElementById('chart-agent-select');
    const cur = sel.value;
    sel.innerHTML = '<option value="">— Chọn Agent —</option>';
    for (const [id, meta] of Object.entries(agentMeta)) {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = meta.name;
        if (id === cur) opt.selected = true;
        sel.appendChild(opt);
    }
    if (!sel.value && Object.keys(agentMeta).length > 0) {
        sel.value = Object.keys(agentMeta)[0];
    }
    loadCharts();
}

function openAgentCharts(agentId, agentName) {
    switchTab('charts', document.getElementById('btn-charts'));
    populateAgentSelect();
    document.getElementById('chart-agent-select').value = agentId;
    loadCharts();
}

async function loadCharts() {
    const agentId = document.getElementById('chart-agent-select').value;
    if (!agentId) return;

    const history = await fetch(`/api/metrics/${agentId}?range=${currentRange}`).then(r => r.json());

    const labels = history.map(h => new Date(h.collected_at));
    const cpuData  = history.map(h => h.cpu_percent);
    const ramData  = history.map(h => h.ram_percent);
    const diskData = history.map(h => h.disk_percent);
    const netSend  = history.map(h => ((h.extra_data?.net_send_bps || 0) / 1024).toFixed(2));
    const netRecv  = history.map(h => ((h.extra_data?.net_recv_bps || 0) / 1024).toFixed(2));

    renderChart('chart-cpu',  labels, [
        { label: 'CPU %', data: cpuData, borderColor: '#818cf8', backgroundColor: 'rgba(129,140,248,0.12)' }
    ], '%');

    renderChart('chart-ram',  labels, [
        { label: 'RAM %', data: ramData, borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.12)' }
    ], '%');

    renderChart('chart-disk', labels, [
        { label: 'Disk %', data: diskData, borderColor: '#fb923c', backgroundColor: 'rgba(251,146,60,0.12)' }
    ], '%');

    renderChart('chart-net',  labels, [
        { label: '↑ Send KB/s', data: netSend, borderColor: '#a78bfa', backgroundColor: 'rgba(167,139,250,0.1)' },
        { label: '↓ Recv KB/s', data: netRecv, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)' }
    ], 'KB/s');
}

function renderChart(canvasId, labels, datasets, yUnit) {
    if (chartInstances[canvasId]) chartInstances[canvasId].destroy();

    const ctx = document.getElementById(canvasId).getContext('2d');
    chartInstances[canvasId] = new Chart(ctx, {
        type: 'line',
        data: {
            labels,
            datasets: datasets.map(d => ({
                ...d,
                tension: 0.35,
                fill: true,
                pointRadius: labels.length > 100 ? 0 : 2,
                borderWidth: 2
            }))
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: '#94a3b8', boxWidth: 12 } },
                tooltip: {
                    backgroundColor: 'rgba(15,23,42,0.95)',
                    borderColor: 'rgba(99,102,241,0.3)',
                    borderWidth: 1,
                    callbacks: {
                        label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y} ${yUnit}`
                    }
                }
            },
            scales: {
                x: {
                    type: 'time',
                    time: { tooltipFormat: 'HH:mm dd/MM', displayFormats: { hour: 'HH:mm', day: 'dd/MM' } },
                    ticks: { color: '#475569', maxTicksLimit: 8 },
                    grid: { color: 'rgba(255,255,255,0.04)' }
                },
                y: {
                    ticks: { color: '#475569', callback: v => `${v} ${yUnit}` },
                    grid: { color: 'rgba(255,255,255,0.04)' }
                }
            }
        }
    });
}
</script>

</html>
