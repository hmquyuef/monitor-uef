<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor-UEF | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .dashboard { max-width: 1200px; margin: 0 auto; }

        nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--primary); }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab-content { display: none; margin-top: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.5s; }

        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }

        .agents-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .agent-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .metric-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .metric-item { text-align: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; }
        .metric-value { font-size: 1.2rem; font-weight: 600; display: block; }

        /* Settings Style */
        .settings-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; opacity: 0.8; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        .alert-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .severity-critical { width:10px; height:10px; background: #ef4444; border-radius:50%; margin-right:15px; }

    </style>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Monitor-UEF Admin</h1>
            <nav>
                <button class="nav-btn active" onclick="switchTab('dashboard')">🏠 Dashboard</button>
                <button class="nav-btn" onclick="switchTab('settings')">⚙️ Settings</button>
            </nav>
        </header>

        <!-- DASHBOARD TAB -->
        <div id="dashboard-tab" class="tab-content active">
            <section class="agents-grid" id="agents-container"></section>
            
            <section style="margin-top:40px; background:var(--card-bg); padding:20px; border-radius:20px;">
                <h2>Cảnh báo mới nhất</h2>
                <div id="alerts-list"></div>
            </section>
        </div>

        <!-- SETTINGS TAB -->
        <div id="settings-tab" class="tab-content">
            <div class="settings-card">
                <h2>Cấu hình hệ thống</h2>
                <form id="settings-form">
                    <div class="form-group">
                        <label>Thời gian thu thập (giây)</label>
                        <input type="number" name="collect_interval" value="10" min="1">
                    </div>
                    <div class="form-group">
                        <label>Telegram Bot Token</label>
                        <input type="text" name="telegram_bot_token" placeholder="7123456...">
                    </div>
                    <div class="form-group">
                        <label>Telegram Chat ID</label>
                        <input type="text" name="telegram_chat_id" placeholder="123456...">
                    </div>
                    <button type="submit" class="save-btn">Lưu cấu hình</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        function formatUptime(seconds) {
            const days = Math.floor(seconds / (24 * 3600));
            const hrs = Math.floor((seconds % (24 * 3600)) / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            let res = [];
            if (days > 0) res.push(`${days}d`);
            if (hrs > 0) res.push(`${hrs}h`);
            if (mins > 0) res.push(`${mins}m`);
            return res.join(' ') || '< 1m';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(`${tabId}-tab`).classList.add('active');
            event.target.classList.add('active');

            if (tabId === 'settings') loadSettings();
        }

        async function loadSettings() {
            const resp = await fetch('/api/settings');
            const data = await resp.json();
            const form = document.getElementById('settings-form');
            for (const [key, value] of Object.entries(data)) {
                if (form.elements[key]) form.elements[key].value = value;
            }
        }

        document.getElementById('settings-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const resp = await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (resp.ok) alert('Đã lưu cấu hình thành công!');
        };

        socket.on('metric:update', (data) => {
            const container = document.getElementById('agents-container');
            let card = document.getElementById(`agent-${data.agent_id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `agent-${data.agent_id}`;
                card.className = 'agent-card';
                container.appendChild(card);
            }

            const extra = data.metrics.extra_data || {};
            const uptimeStr = extra.uptime ? formatUptime(extra.uptime) : 'N/A';
            const perCpu = extra.per_cpu || [];
            
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin:0;">${data.agent_name}</h3>
                    <span style="font-size:0.8rem; opacity:0.6;">Uptime: ${uptimeStr}</span>
                </div>
                
                <div class="metric-info">
                    <div class="metric-item"><span class="metric-value">${data.metrics.cpu_percent}%</span>CPU</div>
                    <div class="metric-item"><span class="metric-value">${data.metrics.ram_percent}%</span>RAM</div>
                    <div class="metric-item"><span class="metric-value">${data.metrics.disk_percent}%</span>Disk</div>
                </div>

                <div style="margin: 15px 0; font-size: 0.85rem; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span>Swap: ${Math.round(data.metrics.swap_used / 1024 / 1024 / 1024 * 100) / 100} GB</span>
                        <span>Tasks: ${extra.total_tasks || 0}</span>
                        <span>Threads: ${extra.total_threads || 0}</span>
                    </div>
                </div>

                <div style="margin-top:10px;">
                    <label style="font-size:0.75rem; opacity:0.5;">Cores Usage:</label>
                    <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:5px;">
                        ${perCpu.map((usage, i) => `
                            <div title="Core ${i}: ${usage}%" style="width:20px; height:20px; background: rgba(99, 102, 241, ${usage/100 + 0.1}); border-radius:4px; border:1px solid rgba(255,255,255,0.1);"></div>
                        `).join('')}
                    </div>
                </div>
            `;
        });

        socket.on('alert:new', (alert) => {
            const list = document.getElementById('alerts-list');
            const item = document.createElement('div');
            item.className = 'alert-item';
            item.innerHTML = `<div class="severity-critical"></div> <strong>${alert.agent_name}</strong>: ${alert.message}`;
            list.prepend(item);
        });
    </script>
</body>
</html>
